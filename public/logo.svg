<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#3b0764"/>
    </radialGradient>
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="innerGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Outer glow halo -->
  <circle cx="256" cy="256" r="200" fill="url(#glowGrad)" filter="url(#glow)"/>

  <!-- Main circle background -->
  <circle cx="256" cy="256" r="200" fill="url(#bgGrad)" stroke="rgba(168,85,247,0.6)" stroke-width="3"/>

  <!-- Inner ring -->
  <circle cx="256" cy="256" r="175" fill="none" stroke="rgba(168,85,247,0.2)" stroke-width="1.5"/>

  <!-- Forge anvil base -->
  <rect x="176" y="308" width="160" height="28" rx="8" fill="rgba(255,255,255,0.9)" filter="url(#innerGlow)"/>
  <rect x="196" y="282" width="120" height="30" rx="5" fill="rgba(255,255,255,0.85)"/>

  <!-- Lightning bolt (AI spark) -->
  <path d="M272 158 L228 262 L258 262 L240 354 L296 236 L264 236 Z"
        fill="#e9d5ff"
        stroke="#c084fc"
        stroke-width="3"
        stroke-linejoin="round"
        filter="url(#innerGlow)"/>

  <!-- Small sparkles -->
  <circle cx="174" cy="200" r="5" fill="#c084fc" opacity="0.8"/>
  <circle cx="338" cy="190" r="7" fill="#a855f7" opacity="0.7"/>
  <circle cx="320" cy="330" r="4" fill="#c084fc" opacity="0.6"/>
  <circle cx="185" cy="310" r="4" fill="#a855f7" opacity="0.5"/>

  <!-- Top spark lines -->
  <line x1="256" y1="56" x2="256" y2="82" stroke="#a855f7" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <line x1="320" y1="72" x2="308" y2="95" stroke="#a855f7" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="192" y1="72" x2="204" y2="95" stroke="#a855f7" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
</svg>
